<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Echoes Beyond Infinity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/game.css">
</head>
<body>
  <!-- Title bar drag region (for frameless window) -->
  <div id="titlebar-drag"></div>

  <!-- CRT Monitor -->
  <div id="crt">
    <div id="screen">
      <!-- Terminal content -->
      <div id="terminal">
        <div id="terminal-output"></div>
        <div id="terminal-input"></div>
      </div>

      <!-- Optional status sidebar (hidden initially) -->
      <div id="status-panel" class="hidden">
        <div id="status-content"></div>
      </div>
    </div>

    <!-- CRT overlays -->
    <div id="scanlines"></div>
    <div id="vignette"></div>
    <div id="screen-noise"></div>
  </div>

  <!-- Effects layer (screen flash, etc.) -->
  <div id="effects-layer"></div>

  <!-- Audio elements -->
  <div id="audio-container"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
